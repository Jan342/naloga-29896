name: 29896 Test CI


on:
  push:
    branches: [ main ]

jobs:
  preveri-teste:
    name: Preveri obstoj testnih skript
    runs-on: self-hosted

    steps:
      - name: Prenesi kodo
        uses: actions/checkout@v4

      - name: Preveri, ali testi obstajajo
        shell: bash
        run: |
          python3 - <<'PY' 2> napaka.txt
          from pathlib import Path

          testne_datoteke = list(Path("tests").glob("test_*.py"))

          if not testne_datoteke:
              raise SystemExit("Napaka: testne skripte ne obstajajo.")

          print("Najdene testne skripte:")
          for datoteka in testne_datoteke:
              print(datoteka)
          PY

      - name: Shrani napaka.txt kot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt

  izvedi-teste:
    name: Pripravi okolje in izvedi teste
    runs-on: self-hosted
    needs: preveri-teste

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Prenesi kodo
        uses: actions/checkout@v4

      - name: Prenesi napaka.txt artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka
          path: artifacts

      - name: Preveri vsebino napaka.txt
        shell: bash
        run: |
          if [ -s artifacts/napaka.txt ]; then
            echo "Datoteka napaka.txt ni prazna:"
            cat artifacts/napaka.txt
            exit 1
          fi

          echo "Datoteka napaka.txt je prazna, nadaljujem s testi."

      - name: Nastavi Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Namesti odvisnosti
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Zazeni teste
        shell: bash
        run: |
          python -m pytest -v
